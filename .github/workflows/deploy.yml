# Manual deploy to Cloudflare (eliotsgarden.com).
#
# Requires a repo secret CLOUDFLARE_API_TOKEN (Cloudflare dashboard ->
# My Profile -> API Tokens -> "Edit Cloudflare Workers" template).
# Once that secret exists, you can also enable auto-deploy by adding:
#   push:
#     branches: [main]
# under `on:`.
name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eliots-garden
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: eliots-garden/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
